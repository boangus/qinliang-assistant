            </div>
            <button class="btn-press w-10 h-10 rounded-full bg-blue-100 text-blue-600 font-bold text-lg flex items-center justify-center"
                    @click="water = Math.min(3000, water + 250)">+</button>
          </div>
          <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full rounded-full bg-blue-500 transition-all" :style="{ width: Math.min(100, water / 20) + '%' }"></div>
          </div>
        </div>

        <!-- 案例卡片 -->
        <div class="card" style="background: linear-gradient(135deg, #fffaf0, #fefcbf);">
          <div class="flex items-start gap-3">
            <span class="text-2xl">🌟</span>
            <div>
              <h3 class="font-bold text-sm text-gray-800 mb-1">案例：老张的饮食调整</h3>
              <p class="text-xs text-gray-600 leading-relaxed">67岁前列腺癌ADT患者，记录发现晚餐辛辣食物和白酒是主要诱因。调整4周后，夜间盗汗从每周5次降至1次，平均严重度从3.2降至1.8。</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  `,
  setup(props) {
    const root = Vue.inject('root');
    const store = Vue.inject('store');
    const meals = [
      { key: 'breakfast', label: '早餐' },
      { key: 'lunch', label: '午餐' },
      { key: 'dinner', label: '晚餐' },
      { key: 'snack', label: '加餐' },
    ];
    const currentMeal = ref('breakfast');
    const selectedFoods = reactive([]);
    const dietNote = ref('');
    const water = ref(0);

    // 从 localStorage 初始化
    const todayStr = new Date().toISOString().slice(0, 10);
    const dietKey = 'qinling_diet_' + todayStr;
    const waterKey = 'qinling_water_' + todayStr;
    const savedDiet = localStorage.getItem(dietKey);
    const savedWater = localStorage.getItem(waterKey);
    const dietLogs = reactive(savedDiet ? JSON.parse(savedDiet) : []);
    water.value = savedWater ? parseInt(savedWater) : 0;

    const recommendFoods = computed(() => DIET_FOODS.filter(f => f.type === 'recommend'));
    const moderateFoods = computed(() => DIET_FOODS.filter(f => f.type === 'moderate'));
    const avoidFoods = computed(() => DIET_FOODS.filter(f => f.type === 'avoid'));

    const todayLog = computed(() => {
      return dietLogs.slice().reverse().map(l => ({
        ...l,
        mealLabel: meals.find(m => m.key === l.meal)?.label || l.meal
      }));
    });

    const waterStatus = computed(() => {
      if (water.value < 800) return '还需多喝水，帮助体温调节';
      if (water.value < 1500) return '饮水量良好，继续保持';
      return '今日饮水目标已达成';
    });

    const toggleFood = (name) => {
      const idx = selectedFoods.indexOf(name);
      if (idx >= 0) selectedFoods.splice(idx, 1);
      else selectedFoods.push(name);
    };

    const foodEmoji = (name) => {
      const f = DIET_FOODS.find(x => x.name === name);
      return f ? f.emoji + ' ' : '';
    };

    const addLog = () => {
      if (!selectedFoods.length && !dietNote.value) return;
      dietLogs.push({
        id: Date.now(),
        meal: currentMeal.value,
        foods: [...selectedFoods],
        note: dietNote.value,
        time: new Date().toISOString(),
      });
      localStorage.setItem(dietKey, JSON.stringify(dietLogs));
      selectedFoods.length = 0;
      dietNote.value = '';
    };

    const removeLog = (id) => {
      const idx = dietLogs.findIndex(l => l.id === id);
      if (idx >= 0) dietLogs.splice(idx, 1);
      localStorage.setItem(dietKey, JSON.stringify(dietLogs));
    };

    watch(() => water.value, (val) => {
      localStorage.setItem(waterKey, String(val));
    });

    return {
      DIET_FOODS, meals, currentMeal, selectedFoods, dietNote, water,
      recommendFoods, moderateFoods, avoidFoods, todayLog, waterStatus,
      toggleFood, foodEmoji, addLog, removeLog,
    };
  },
};

            </div>
          </div>

  `,
  setup(props) {
    const root = Vue.inject('root');
    const activeTool = ref(null);
    const remaining = ref(0);
    const timerRunning = ref(false);
    let intervalId = null;
    const anxietyBefore = ref(5);
    const anxietyAfter = ref(3);
    const selectedTier = ref(null);

    // ---------- 7 天入门计划 ----------
    const planKey = 'qinling_cbt_7day_plan';
    const savedPlan = localStorage.getItem(planKey);
    const planState = reactive(savedPlan ? JSON.parse(savedPlan) : { startDate: new Date().toISOString().slice(0, 10), completed: [] });
    const activeDay = ref(null);

    const todayStr = new Date().toISOString().slice(0, 10);
    const currentDay = computed(() => {
      const start = new Date(planState.startDate);
      const today = new Date(todayStr);
      const diff = Math.floor((today - start) / (24 * 60 * 60 * 1000));
      return Math.max(1, Math.min(7, diff + 1));
    });

    const completedDaysCount = computed(() => planState.completed.length);
    const isDayCompleted = (day) => planState.completed.includes(day);

    const selectDay = (day) => {
      activeDay.value = day;
      selectTool(day.toolId);
      // 自动滚动到对应工具
      nextTick(() => {
        const el = document.getElementById('cbt-tool-' + day.toolId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    };

    const markDayCompleted = (day) => {
      if (!planState.completed.includes(day)) {
        planState.completed.push(day);
        planState.completed.sort((a, b) => a - b);
        localStorage.setItem(planKey, JSON.stringify(planState));
      }
    };

    const moodKey = 'qinling_cbt_mood_' + todayStr;
    const savedMood = localStorage.getItem(moodKey);
    const moodLogs = reactive(savedMood ? JSON.parse(savedMood) : []);

    const wsKey = 'qinling_cbt_worksheet_' + todayStr;
    const savedWs = localStorage.getItem(wsKey);
    const worksheetLogs = reactive(savedWs ? JSON.parse(savedWs) : []);
    const worksheet = reactive({ situation: '', thought: '', evidenceFor: '', evidenceAgainst: '', alternative: '', plan: '' });

    const chkKey = 'qinling_cbt_checklist_' + todayStr;
    const savedChk = localStorage.getItem(chkKey);
    const checklistState = reactive(savedChk ? JSON.parse(savedChk) : {});

    const evidenceClass = (level) => {
      if (level === 'A') return 'bg-green-100 text-green-700';
      if (level === 'B') return 'bg-blue-100 text-blue-700';
      return 'bg-gray-100 text-gray-600';
    };

    const selectTool = (id) => {
      if (activeTool.value === id) {
        activeTool.value = null;
        resetTimer(0);
        selectedTier.value = null;
      } else {
        activeTool.value = id;
        const tool = CBT_TOOLS.find(t => t.id === id);
        resetTimer(tool ? tool.duration : 0);
        selectedTier.value = null;
      }
    };

    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    };

    const toggleTimer = (duration) => {
      if (timerRunning.value) {
        clearInterval(intervalId);
        intervalId = null;
        timerRunning.value = false;
      } else {
        if (remaining.value <= 0) remaining.value = duration;
        timerRunning.value = true;
        intervalId = setInterval(() => {
          if (remaining.value > 0) remaining.value--;
          else {
            clearInterval(intervalId);
            intervalId = null;
            timerRunning.value = false;
          }
        }, 1000);
      }
    };

    const resetTimer = (duration) => {
      clearInterval(intervalId);
      intervalId = null;
      timerRunning.value = false;
      remaining.value = duration;
    };

    const saveMoodLog = () => {
      moodLogs.push({
        id: Date.now(),
        before: anxietyBefore.value,
        after: anxietyAfter.value,
        time: new Date().toISOString(),
      });
      localStorage.setItem(moodKey, JSON.stringify(moodLogs));
      anxietyAfter.value = Math.max(1, anxietyAfter.value - 1);
    };

    const saveWorksheet = () => {
      if (!worksheet.situation && !worksheet.thought) return;
      worksheetLogs.push({ id: Date.now(), ...Vue.toRaw ? Vue.toRaw(worksheet) : JSON.parse(JSON.stringify(worksheet)), time: new Date().toISOString() });
      localStorage.setItem(wsKey, JSON.stringify(worksheetLogs));
      Object.keys(worksheet).forEach(k => worksheet[k] = '');
    };

    const checkedCount = (tool) => {
      return tool.items.filter(item => checklistState[item.id]).length;
    };

    const toggleChecklist = (id) => {
      checklistState[id] = !checklistState[id];
      localStorage.setItem(chkKey, JSON.stringify(checklistState));
    };

    onUnmounted(() => {
      if (intervalId) clearInterval(intervalId);
    });

    return {
      CBT_TOOLS, CBT_7DAY_PLAN, activeTool, remaining, timerRunning, selectedTier,
      anxietyBefore, anxietyAfter, moodLogs, worksheet, worksheetLogs, checklistState,
      activeDay, currentDay, completedDaysCount,
      selectTool, formatTime, toggleTimer, resetTimer, saveMoodLog, saveWorksheet,
      checkedCount, toggleChecklist, evidenceClass,
      selectDay, isDayCompleted, markDayCompleted,
    };
  },
};

          <div class="space-y-2">

  setup(props) {
    const store = Vue.inject('store');
    const exerciseChartRef = ref(null);
    const today = new Date().toISOString().slice(0, 10);
    const form = reactive({ date: today, aerobic: 30, resistance: 0, note: '' });

    const weekRange = computed(() => {
      const dates = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        dates.push(d.toISOString().slice(0, 10));
      }
      return dates;
    });

    const weeklyAerobic = computed(() => {
      return store.exerciseLogs
        .filter(l => weekRange.value.includes(l.date))
        .reduce((sum, l) => sum + (Number(l.aerobic) || 0), 0);
    });
    const weeklyResistance = computed(() => {
      return store.exerciseLogs
        .filter(l => weekRange.value.includes(l.date))
        .reduce((sum, l) => sum + (Number(l.resistance) || 0), 0);
    });

    const recentLogs = computed(() => {
      return [...store.exerciseLogs].sort((a, b) => new Date(b.date) - new Date(a.date));
    });

    const addLog = () => {
      const idx = store.exerciseLogs.findIndex(l => l.date === form.date);
      if (idx >= 0) {
        store.exerciseLogs[idx].aerobic = (store.exerciseLogs[idx].aerobic || 0) + form.aerobic;
        store.exerciseLogs[idx].resistance = (store.exerciseLogs[idx].resistance || 0) + form.resistance;
        if (form.note) store.exerciseLogs[idx].note = form.note;
      } else {
        store.exerciseLogs.push({ id: `ex-${Date.now()}`, date: form.date, aerobic: form.aerobic, resistance: form.resistance, note: form.note });
      }
      form.aerobic = 30; form.resistance = 0; form.note = '';
    };

    const weeklyData = computed(() => {
      const weeks = [];
      for (let w = 3; w >= 0; w--) {
        const end = new Date(); end.setDate(end.getDate() - w * 7);
        const start = new Date(end); start.setDate(start.getDate() - 6);
        const endStr = end.toISOString().slice(0, 10);
        const startStr = start.toISOString().slice(0, 10);
        const logs = store.exerciseLogs.filter(l => l.date >= startStr && l.date <= endStr);
        const aerobic = logs.reduce((s, l) => s + (Number(l.aerobic) || 0), 0);
        const resistance = logs.reduce((s, l) => s + (Number(l.resistance) || 0), 0);
        weeks.push({ label: `${startStr.slice(5)}~${endStr.slice(5)}`, aerobic, resistance });
      }
      return weeks;
    });

    onMounted(() => {
      nextTick(() => {
        if (!exerciseChartRef.value || typeof echarts === 'undefined') return;
        const chart = echarts.init(exerciseChartRef.value);
        const data = weeklyData.value;
        chart.setOption({
          tooltip: { trigger: 'axis' },
          legend: { data: ['有氧分钟', '抗阻次数'], bottom: 0, textStyle: { fontSize: 10 } },
          grid: { left: 40, right: 20, top: 20, bottom: 30 },
          xAxis: { type: 'category', data: data.map(d => d.label), axisLabel: { fontSize: 9 } },
          yAxis: { type: 'value', axisLabel: { fontSize: 9 } },
          series: [
            { name: '有氧分钟', type: 'bar', data: data.map(d => d.aerobic), itemStyle: { color: '#4299e1' } },
            { name: '抗阻次数', type: 'bar', data: data.map(d => d.resistance), itemStyle: { color: '#48bb78' } },
          ],
        });
      });
    });

    return { store, form, weeklyAerobic, weeklyResistance, recentLogs, addLog, exerciseChartRef };
  },
};

    const severityMap = { mild: 1, moderate: 2, severe: 3, extreme: 4 };
    const recentRecords = computed(() => {

    });
    const totalFlashes = computed(() => recentRecords.value.length);
    const avgPerDay = computed(() => (totalFlashes.value / 30).toFixed(1));
    const avgSeverity = computed(() => {
      if (!recentRecords.value.length) return '-';
      const avg = recentRecords.value.reduce((sum, s) => sum + (severityMap[s.severity] || 2), 0) / recentRecords.value.length;
      return avg.toFixed(1);
    });
    const severityCounts = computed(() => {
      const c = { mild: 0, moderate: 0, severe: 0, extreme: 0 };
      recentRecords.value.forEach(s => { c[s.severity] = (c[s.severity] || 0) + 1; });
      return c;
    });
    const severityPct = computed(() => {
      const total = totalFlashes.value || 1;
      return {
        mild: (severityCounts.value.mild / total) * 100,
        moderate: (severityCounts.value.moderate / total) * 100,
        severe: (severityCounts.value.severe / total) * 100,
        extreme: (severityCounts.value.extreme / total) * 100,
      };
    });

    // 诱因统计（使用记录中的 triggers 数组）
    const triggerStats = computed(() => {
      const counts = {};
      recentRecords.value.forEach(s => {
        (s.triggers || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; });
      });
      return Object.entries(counts).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
    });
    const topTrigger = computed(() => triggerStats.value[0] || null);

    // 干预效果统计
    const interventionStats = computed(() => {
      const groups = {};
      recentRecords.value.forEach(s => {
        const key = s.intervention || '无';
        if (!groups[key]) groups[key] = [];
        groups[key].push(severityMap[s.severity] || 2);
      });
      return Object.entries(groups)
        .map(([name, scores]) => ({ name, avg: scores.reduce((a, b) => a + b, 0) / scores.length, count: scores.length }))
        .filter(i => i.count >= 2)
        .sort((a, b) => a.avg - b.avg);

    const avgCheckin = (key) => {

        const end = new Date(now); end.setDate(end.getDate() - weekOffset * 7);
        const start = new Date(end); start.setDate(start.getDate() - 6);
        return { start: start.toISOString().slice(0, 10), end: end.toISOString().slice(0, 10) };
      };
      const thisWeek = getWeekRange(0);
      const lastWeek = getWeekRange(1);

      const thisRecords = recentRecords.value.filter(s => s.time.slice(0, 10) >= thisWeek.start && s.time.slice(0, 10) <= thisWeek.end);

      const thisCount = thisRecords.length;
      const lastCount = lastRecords.length || 1;

      return {
        flashCount: { this: thisCount, last: lastRecords.length, change: thisCount - lastRecords.length, pct: ((thisCount - lastRecords.length) / lastCount * 100).toFixed(0) },

        fatigue: { this: avgKey(checkinThis, 'fatigue'), last: avgKey(checkinLast, 'fatigue'), change: avgKey(checkinThis, 'fatigue') - avgKey(checkinLast, 'fatigue') },
      };

      // 基于每日检查趋势的建议
      if (sleepScore !== '-' && parseFloat(sleepScore) <= 2.5) {
        recs.push({ title: '睡眠卫生优化 + CBT 放松', desc: '近 14 天睡眠质量较低。建议卧室保持 15–18°C、使用透气床品、睡前 60–90 分钟洗温水澡，并配合 4-7-8 呼吸或渐进式肌肉放松。', evidence: 'A' });
      }
      if (fatigueScore !== '-' && parseFloat(fatigueScore) <= 2.5) {
        recs.push({ title: '规律运动处方', desc: '疲劳感明显，建议每周 150 分钟中等强度有氧运动 + 2 次抗阻训练。STAMINA 等 RCT 显示运动可改善 ADT 患者的疲劳与生活质量。', evidence: 'A' });
      }
      if (moodScore !== '-' && parseFloat(moodScore) <= 2.5) {
        recs.push({ title: 'CBT 认知重构', desc: '情绪评分偏低，建议使用 CBT 工具中的认知重构工作表，识别并调整对潮热的灾难化思维。MANCAN2 研究显示 CBT 可在 6 周内改善焦虑与抑郁。', evidence: 'A' });
      }

      // 周环比触发建议

        recs.push({ title: '潮热频率周环比上升', desc: `本周潮热发作较上周增加 ${wc.flashCount.change} 次（${wc.flashCount.pct > 0 ? '+' : ''}${wc.flashCount.pct}%）。建议回顾本周诱因记录，强化 CBT 放松练习，必要时与医生沟通治疗方案。`, evidence: 'B' });
      }
      if (wc.severity.change > 0.3) {
        recs.push({ title: '平均严重度周环比加重', desc: '本周潮热平均严重度较上周上升，建议立即启用分层降温技术，并检查是否有新的诱因（如药物调整、感染、压力事件）。', evidence: 'B' });
      }
      if (wc.sleep.change < -0.5) {
        recs.push({ title: '睡眠质量周环比下降', desc: '本周睡眠质量评分较上周下降，建议优化睡眠环境，避免睡前咖啡因和酒精，必要时使用 CBT 睡眠卫生检查表。', evidence: 'A' });
      }
      if (wc.mood.change < -0.5) {
        recs.push({ title: '情绪状态周环比下降', desc: '本周情绪评分较上周下降，建议每日使用认知重构工作表，必要时寻求心理支持或医生帮助。', evidence: 'A' });
      }
      if (wc.fatigue.change < -0.5) {
        recs.push({ title: '疲劳感周环比加重', desc: '本周疲劳评分较上周下降，建议循序渐进增加有氧运动，并评估睡眠质量和贫血/甲状腺功能。', evidence: 'B' });
      }

      // 基于诱因数据
      if (topTrigger.value) {
        if (['辛辣食物', '酒精', '咖啡因'].includes(topTrigger.value.name)) {
          recs.push({ title: '饮食诱因管理', desc: `您的记录显示 ${topTrigger.value.name} 是主要诱因。NCI PDQ 与 ASCO 教育资料均建议限制这些触发因素以减轻潮热。`, evidence: 'A' });
        } else if (['闷热环境', '情绪激动', '运动/活动后'].includes(topTrigger.value.name)) {
          recs.push({ title: '环境与触发管理', desc: `${topTrigger.value.name} 是主要诱因，建议提前使用分层降温技术（便携风扇、冷敷、多层衣物）。`, evidence: 'B' });
        }
      }

      // 基于发作频率与严重度
      if (total >= 20) {
        recs.push({ title: 'CBT 自我管理课程', desc: '发作频率较高，建议系统使用 CBT 工具中的呼吸、肌肉放松和认知重构练习。MANCAN2 采用 4 周 CBT 方案，6 周时 HFNS 严重程度显著下降。', evidence: 'A' });
      }
      if (parseFloat(avgSeverity.value) >= 2.5) {
        recs.push({ title: '分层降温技术', desc: '平均严重度偏高，建议在潮热前兆期（核心体温上升阶段）立即脱衣、冷敷颈后/手腕，并启动慢呼吸。', evidence: 'B' });
      }

      // 通用循证建议（避免空报告）
      if (!recs.length) {
        recs.push({ title: 'CBT 放松练习', desc: ' paced breathing 与放松训练被 NCI PDQ 列为非药物干预证据，可每日练习 4-7-8 呼吸或腹式呼吸。', evidence: 'A' });
        recs.push({ title: '饮食与生活方式', desc: '限制酒精、咖啡因和辛辣食物，适量摄入大豆制品（约 50mg 异黄酮/日），保持每日 1500–2000ml 饮水。', evidence: 'B' });
      }

      return recs;
    });

    const evidenceClass = (level) => {
      if (level === 'A') return 'bg-green-100 text-green-700';
      if (level === 'B') return 'bg-blue-100 text-blue-700';
      return 'bg-gray-100 text-gray-600';
    };

    const printReport = () => { window.print(); };

    onMounted(() => {
      if (!checkinChartRef.value || !store.dailyCheckins.length) return;
      const chart = echarts.init(checkinChartRef.value);
      const recent = store.dailyCheckins.slice(-14);
      const option = {
        tooltip: { trigger: 'axis' },
        legend: { data: ['睡眠', '情绪', '疲劳'], bottom: 0, textStyle: { fontSize: 10 } },
        grid: { left: 30, right: 10, top: 20, bottom: 30 },
        xAxis: { type: 'category', data: recent.map(c => c.date.slice(5)), axisLabel: { fontSize: 9 } },
        yAxis: { type: 'value', min: 1, max: 5, axisLabel: { fontSize: 9 } },
        series: [
          { name: '睡眠', type: 'line', data: recent.map(c => c.sleep), smooth: true, itemStyle: { color: '#4299e1' } },
          { name: '情绪', type: 'line', data: recent.map(c => c.mood), smooth: true, itemStyle: { color: '#48bb78' } },
          { name: '疲劳', type: 'line', data: recent.map(c => c.fatigue), smooth: true, itemStyle: { color: '#ed8936' } },
        ],
      };
      chart.setOption(option);
    });

    return {
      store, reportDate, totalFlashes, avgPerDay, avgSeverity,
      severityCounts, severityPct, topTrigger, bestIntervention,
      avgCheckin, recommendations, evidenceClass, printReport,
      checkinChartRef, doctorNote, weeklyCompare,
    };
  },
};

const app = createApp({
  setup() {
    // ---------- 全局状态 ----------
    const loadFromStorage = (key, defaultValue) => {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : defaultValue;
      } catch { return defaultValue; }
    };

    const store = reactive({
      symptoms: loadFromStorage(STORAGE_KEYS.symptoms, []),
      profile: loadFromStorage(STORAGE_KEYS.profile, {
        name: '演示用户',
        gender: 'male',
        age: 65,
        condition: '前列腺癌ADT治疗中',
      }),
      constitution: loadFromStorage(STORAGE_KEYS.constitution, null),
      scaleResults: loadFromStorage(STORAGE_KEYS.scaleResults, []),
      dailyCheckins: loadFromStorage(STORAGE_KEYS.dailyCheckins, []),
      dietLogs: loadFromStorage(STORAGE_KEYS.dietLogs, []),
      waterLogs: loadFromStorage(STORAGE_KEYS.waterLogs, []),
      exerciseLogs: loadFromStorage(STORAGE_KEYS.exerciseLogs, []),
    });

    // 首次加载时如果没有数据，生成演示数据
    if (!store.symptoms.length) {
      store.symptoms = generateDemoData();
    }

    // 自动保存到 localStorage
    watch(() => store.symptoms, (val) => {
      localStorage.setItem(STORAGE_KEYS.symptoms, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.profile, (val) => {
      localStorage.setItem(STORAGE_KEYS.profile, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.constitution, (val) => {
      localStorage.setItem(STORAGE_KEYS.constitution, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.scaleResults, (val) => {
      localStorage.setItem(STORAGE_KEYS.scaleResults, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.dailyCheckins, (val) => {
      localStorage.setItem(STORAGE_KEYS.dailyCheckins, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.dietLogs, (val) => {
      localStorage.setItem(STORAGE_KEYS.dietLogs, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.waterLogs, (val) => {
      localStorage.setItem(STORAGE_KEYS.waterLogs, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.exerciseLogs, (val) => {
      localStorage.setItem(STORAGE_KEYS.exerciseLogs, JSON.stringify(val));
    }, { deep: true });

    // 提供给所有子组件
    Vue.provide('store', store);

    // ---------- 路由系统 ----------
    const tabs = TABS;
    const currentTab = ref('home');
    const currentPage = ref('home');
    const pageParams = ref({});
    const pageHistory = ref([]);

    const isSubPage = computed(() => !TAB_PAGES.includes(currentPage.value));

    // Tab 栏上显示的页面
    const tabPages = {
      home: 'page-home',
      diary: 'page-diary',
      edu: 'page-edu',
      profile: 'page-profile',
    };

    const switchTab = (tabKey) => {
      currentTab.value = tabKey;
      pageHistory.value = [];
      currentPage.value = tabKey;
      pageParams.value = {};
      window.location.hash = tabKey === 'home' ? '' : tabKey;
    };

    const navigate = (pageName, params = {}) => {
      pageHistory.value.push({ page: currentPage.value, tab: currentTab.value, params: { ...pageParams.value } });
      currentPage.value = pageName;
      pageParams.value = params;
      window.location.hash = pageName;
    };

    const goBack = () => {
      if (pageHistory.value.length) {
        const prev = pageHistory.value.pop();
        currentPage.value = prev.page;
        currentTab.value = prev.tab;
        pageParams.value = prev.params || {};
        window.location.hash = prev.page === 'home' ? '' : prev.page;
      } else {
        switchTab(currentTab.value);
      }
    };

    // 子组件需要通过 inject 获取 root（Vue 3 setup 第二个参数没有 root）
    const root = {
      get pageParams() { return pageParams.value; },
      navigate,
      goBack,
      switchTab,
      currentPage: () => currentPage.value,
      currentTab: () => currentTab.value,
    };
    Vue.provide('root', root);

    // Hash 初始化
    const initFromHash = () => {
      const hash = window.location.hash.slice(1);
      if (hash && ALL_PAGES.includes(hash)) {
        if (TAB_PAGES.includes(hash)) {
          currentTab.value = hash;
          currentPage.value = hash;
        } else {
          currentPage.value = hash;
        }
      }
    };
    initFromHash();
    window.addEventListener('hashchange', initFromHash);

    // ---------- 快速记录 ----------
    const showQuickRecord = ref(false);
    const quickRecord = reactive({
      severity: 'moderate',
      time: new Date().toISOString().slice(0, 16),
      duration: 5,
    });
    const severityOptions = [
      { value: 'mild', label: '轻度', emoji: '🟢', color: '#68d391', bg: '#f0fff4' },
      { value: 'moderate', label: '中度', emoji: '🟡', color: '#f6ad55', bg: '#fffaf0' },
      { value: 'severe', label: '重度', emoji: '🔴', color: '#fc8181', bg: '#fff5f5' },
      { value: 'extreme', label: '极重', emoji: '⚫', color: '#e53e3e', bg: '#fed7d7' },
    ];
    const saveQuickRecord = () => {
      const record = {
        id: `qr-${Date.now()}`,
        time: new Date(quickRecord.time).toISOString(),
        severity: quickRecord.severity,
        duration: quickRecord.duration,
        triggers: [],
        accompanying: [],
        intervention: '无',
        note: '',
      };
      store.symptoms.push(record);
      showQuickRecord.value = false;
      // 重置
      quickRecord.severity = 'moderate';
      quickRecord.time = new Date().toISOString().slice(0, 16);
      quickRecord.duration = 5;
    };

    // ---------- 每日 30 秒检查 ----------
    const showDailyCheckin = ref(false);
    const showPro = ref(false);
    const checkinItems = [
      { key: 'sleep', label: '睡眠质量', emoji: '😴', type: 'score' },
      { key: 'mood', label: '情绪状态', emoji: '😊', type: 'score' },
      { key: 'fatigue', label: '疲劳程度', emoji: '🔋', type: 'score' },
      { key: 'exercise', label: '今日运动', emoji: '🏃', type: 'number', step: 10, unit: '分钟' },
      { key: 'diet', label: '饮食控制', emoji: '🥗', type: 'score' },
      { key: 'water', label: '饮水量', emoji: '💧', type: 'number', step: 250, unit: 'ml' },
    ];
    const proItems = [
      { key: 'factf1', label: 'FACT-F：我感到疲劳' },
      { key: 'factf2', label: 'FACT-F：疲劳影响我的日常活动' },
      { key: 'factf3', label: 'FACT-F：我需要休息' },
      { key: 'phq1', label: 'PHQ-2：做事提不起劲或没有兴趣' },
      { key: 'phq2', label: 'PHQ-2：感到心情低落、沮丧或绝望' },
    ];
    const dailyCheckin = reactive({
      sleep: 3, mood: 3, fatigue: 3, exercise: 0, diet: 3, water: 1500,
      factf1: 0, factf2: 0, factf3: 0, phq1: 0, phq2: 0,
    });
    const resetDailyCheckin = () => {
      dailyCheckin.sleep = 3;
      dailyCheckin.mood = 3;
      dailyCheckin.fatigue = 3;
      dailyCheckin.exercise = 0;
      dailyCheckin.diet = 3;
      dailyCheckin.water = 1500;
      dailyCheckin.factf1 = 0;
      dailyCheckin.factf2 = 0;
      dailyCheckin.factf3 = 0;
      dailyCheckin.phq1 = 0;
      dailyCheckin.phq2 = 0;
    };
    const factFSum = computed(() => (dailyCheckin.factf1 || 0) + (dailyCheckin.factf2 || 0) + (dailyCheckin.factf3 || 0));
    const phq2Sum = computed(() => (dailyCheckin.phq1 || 0) + (dailyCheckin.phq2 || 0));
    const todayCheckin = computed(() => {
      const today = new Date().toISOString().slice(0, 10);
      return store.dailyCheckins.find(c => c.date === today);
    });
    const saveDailyCheckin = () => {
      const today = new Date().toISOString().slice(0, 10);
      const idx = store.dailyCheckins.findIndex(c => c.date === today);
      const record = { date: today, ...dailyCheckin, id: `dc-${Date.now()}` };
      if (idx >= 0) store.dailyCheckins.splice(idx, 1, record);
      else store.dailyCheckins.push(record);
      showDailyCheckin.value = false;
      resetDailyCheckin();
    };

    return {
      store,
      tabs,
      currentTab,
      currentPage,
      pageParams,
      isSubPage,
      switchTab,
      navigate,
      goBack,
      showQuickRecord,
      quickRecord,
      severityOptions,
      saveQuickRecord,
      showDailyCheckin,
      dailyCheckin,
      checkinItems,
      saveDailyCheckin,
      todayCheckin,
      showPro,
      proItems,
      factFSum,
      phq2Sum,
    };
  },
});

Object.entries(pageComponents).forEach(([name, component]) => {
  app.component(name, component);
