<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>沁凉助手 | 潮热盗汗AI智能管理工具</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  /* ========== 全局重置 ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ========== App 容器 ========== */
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: #f7fafc;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
  }

  /* ========== 页面切换过渡 ========== */
  .page-enter-active,
  .page-leave-active {
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .page-enter-from {
    opacity: 0;
    transform: translateX(20px);
  }
  .page-leave-to {
    opacity: 0;
    transform: translateX(-20px);
  }

  /* ========== 底部弹出层过渡 ========== */
  .sheet-enter-active,
  .sheet-leave-active {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
  }
  .sheet-enter-from,
  .sheet-leave-to {
    transform: translateY(100%);
    opacity: 0;
  }

  /* ========== 底部 Tab 栏 ========== */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    height: 56px;
    background: #fff;
    border-top: 1px solid #e2e8f0;
    display: flex;
    z-index: 100;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s;
    color: #a0aec0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-item.active {
    color: #2b6cb0;
  }
  .tab-item .tab-icon {
    font-size: 20px;
    line-height: 1;
    margin-bottom: 2px;
  }
  .tab-item .tab-label {
    font-size: 10px;
    font-weight: 500;
  }

  /* ========== 内容区域（底部留出 Tab 栏空间）========== */
  .page-content {
    padding-bottom: 64px;
    min-height: 100vh;
  }

  /* ========== 渐变头部 ========== */
  .header-gradient {
    background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 50%, #4299e1 100%);
    color: #fff;
    padding: 48px 16px 20px;
    position: relative;
  }
  .header-gradient .back-btn {
    position: absolute;
    top: 44px;
    left: 12px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s;
  }
  .header-gradient .back-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  /* ========== 卡片通用 ========== */
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 16px;
    margin: 12px 16px;
  }

  /* ========== 按钮点击态 ========== */
  .btn-press:active {
    transform: scale(0.96);
    transition: transform 0.1s;
  }

  /* ========== 滚动条美化 ========== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }

  /* ========== 遮罩层 ========== */
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }
  .overlay-inner {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px 16px 0 0;
    padding: 20px 16px 32px;
    max-height: 80vh;
    overflow-y: auto;
  }

  /* ========== 浮动操作按钮 (FAB) ========== */
  .fab {
    position: fixed;
    bottom: 72px;
    right: calc(50% - 210px);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2b6cb0, #4299e1);
    color: #fff;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(66,153,225,0.5);
    cursor: pointer;
    z-index: 50;
    transition: transform 0.2s, box-shadow 0.2s;
    border: none;
    outline: none;
  }
  .fab:active {
    transform: scale(0.92);
    box-shadow: 0 2px 8px rgba(66,153,225,0.3);
  }
  @media (max-width: 480px) {
    .fab { right: 20px; }
  }

  /* ========== 统计图表容器 ========== */
  .chart-container { width: 100%; height: 260px; }
  .chart-container-lg { width: 100%; height: 300px; }

  /* ========== 表单样式 ========== */
  .form-section { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
  .form-input {
    width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px;
    padding: 10px 12px; font-size: 14px; color: #2d3748;
    transition: border-color 0.2s; outline: none; background: #fff;
  }
  .form-input:focus { border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.12); }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .checkbox-item {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 8px; font-size: 13px;
    border: 1.5px solid #e2e8f0; cursor: pointer; transition: all 0.2s;
    user-select: none; background: #fff;
  }
  .checkbox-item.checked { border-color: #4299e1; background: #ebf8ff; color: #2b6cb0; }
  .checkbox-item input[type="checkbox"] { display: none; }
  .radio-group { display: flex; gap: 8px; }
  .radio-item {
    flex: 1; text-align: center; padding: 10px 4px; border-radius: 10px;
    border: 2px solid #e2e8f0; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; user-select: none;
  }
  .radio-item.selected { box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
  .range-slider {
    width: 100%; -webkit-appearance: none; height: 6px;
    border-radius: 3px; background: #e2e8f0; outline: none;
  }
  .range-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    border-radius: 50%; background: #4299e1; cursor: pointer;
    box-shadow: 0 2px 6px rgba(66,153,225,0.3);
  }

  /* ========== 科普文章 Markdown 样式 ========== */
  .edu-markdown h2 { font-size: 1.1rem; font-weight: 700; color: #2d3748; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid #e2e8f0; }
  .edu-markdown h3 { font-size: 0.95rem; font-weight: 700; color: #4a5568; margin: 14px 0 6px; }
  .edu-markdown p { margin: 8px 0; line-height: 1.7; }
  .edu-markdown ul, .edu-markdown ol { margin: 8px 0; padding-left: 20px; }
  .edu-markdown li { margin: 4px 0; line-height: 1.6; }
  .edu-markdown strong { color: #2d3748; font-weight: 600; }
  .edu-markdown em { color: #718096; }
  .edu-markdown hr { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }
</style>
</head>
<body>
<div id="app">
  <!-- ==================== 页面内容区域 ==================== -->
  <div class="page-content">
    <transition name="page" mode="out-in">
      <component :is="'page-' + currentPage" :key="currentPage + JSON.stringify(pageParams)" />
    </transition>
  </div>

  <!-- ==================== 底部 Tab 栏 ==================== -->
  <div class="tab-bar" v-show="!isSubPage">
    <div v-for="tab in tabs" :key="tab.key"
         class="tab-item btn-press"
         :class="{ active: currentTab === tab.key }"
         @click="switchTab(tab.key)">
      <span class="tab-icon">{{ tab.icon }}</span>
      <span class="tab-label">{{ tab.label }}</span>
    </div>
  </div>

  <!-- ==================== 快速记录浮层 ==================== -->
  <transition name="sheet">
    <div v-if="showQuickRecord" class="overlay" @click.self="showQuickRecord = false">
      <div class="overlay-inner">
        <!-- 拖拽指示条 -->
        <div class="flex justify-center mb-3">
          <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
        </div>
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-gray-800">快速记录</h3>
          <span class="text-gray-400 cursor-pointer text-xl" @click="showQuickRecord = false">&times;</span>
        </div>
        <div class="space-y-4">
          <!-- 严重程度选择器 -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">严重程度</label>
            <div class="flex gap-2">
              <button v-for="s in severityOptions" :key="s.value"
                      class="btn-press flex-1 py-2.5 rounded-lg text-sm font-semibold border-2 transition-all"
                      :style="quickRecord.severity === s.value
                        ? { background: s.bg, borderColor: s.color, color: s.color }
                        : { borderColor: '#e2e8f0', color: '#a0aec0' }"
                      @click="quickRecord.severity = s.value">
                {{ s.emoji }} {{ s.label }}
              </button>
            </div>
          </div>
          <!-- 时间选择 -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">发生时间</label>
            <input type="datetime-local" v-model="quickRecord.time"
                   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <!-- 持续时长 -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">持续时长（分钟）</label>
            <div class="flex items-center gap-2">
              <button class="btn-press w-10 h-10 rounded-lg bg-gray-100 text-gray-600 font-bold text-lg flex items-center justify-center"
                      @click="quickRecord.duration = Math.max(1, quickRecord.duration - 1)">−</button>
              <input type="number" v-model.number="quickRecord.duration" min="1" max="120"
                     class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-center text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-400" />
              <button class="btn-press w-10 h-10 rounded-lg bg-gray-100 text-gray-600 font-bold text-lg flex items-center justify-center"
                      @click="quickRecord.duration = Math.min(120, quickRecord.duration + 1)">+</button>
            </div>
          </div>
          <button class="btn-press w-full py-3 rounded-xl bg-gradient-to-r from-blue-600 to-blue-400 text-white font-semibold text-base shadow-lg shadow-blue-200"
                  @click="saveQuickRecord">
            保存记录
          </button>
        </div>
      </div>
    </div>
  </transition>
</div>

<script>
const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

// ==================== 常量定义 ====================
const STORAGE_KEYS = {
  symptoms: 'qinling_symptoms',
  profile: 'qinling_profile',
  constitution: 'qinling_constitution',
  scaleResults: 'qinling_scale_results',
};

const SEVERITY_MAP = {
  mild: { label: '轻度', color: '#68d391', bg: '#f0fff4' },
  moderate: { label: '中度', color: '#f6ad55', bg: '#fffaf0' },
  severe: { label: '重度', color: '#fc8181', bg: '#fff5f5' },
  extreme: { label: '极重度', color: '#e53e3e', bg: '#fed7d7' },
};

const TRIGGERS = ['咖啡因', '酒精', '辛辣食物', '高温环境', '压力', '剧烈运动', '情绪波动'];
const ACCOMPANYING = ['面部潮红', '心悸', '出汗', '失眠', '焦虑', '头痛'];
const INTERVENTIONS = ['无', '腹式呼吸', '耳穴按压', '穴位按摩', '药物', '其他'];

// ==================== Demo 数据生成器 ====================
function generateDemoData() {
  const records = [];
  const now = new Date();
  const totalDays = 30;
  let id = 1;

  for (let d = totalDays - 1; d >= 0; d--) {
    const date = new Date(now);
    date.setDate(date.getDate() - d);

    // 后期天数症状递减、干预递增
    const progress = 1 - d / totalDays; // 0→1 随天数增加
    const baseCount = Math.round(5 - progress * 2.5); // 5次→2-3次
    const count = Math.max(2, baseCount + Math.round((Math.random() - 0.5) * 2));

    for (let i = 0; i < count; i++) {
      const hour = weightedRandomHour();
      const recordDate = new Date(date);
      recordDate.setHours(hour, Math.floor(Math.random() * 60), 0, 0);

      const severity = weightedSeverity();
      const duration = severity === 'extreme'
        ? 15 + Math.floor(Math.random() * 45)
        : severity === 'severe'
          ? 10 + Math.floor(Math.random() * 30)
          : severity === 'moderate'
            ? 5 + Math.floor(Math.random() * 20)
            : 2 + Math.floor(Math.random() * 10);

      // 后期干预使用增加
      const interventionPool = progress > 0.5
        ? INTERVENTIONS
        : ['无', '无', '无', '腹式呼吸', '穴位按摩'];

      const triggerCount = Math.random() < 0.3 ? 0 : 1 + Math.floor(Math.random() * 2);
      const accompanyingCount = 1 + Math.floor(Math.random() * 3);

      const shuffle = (arr) => {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      };

      records.push({
        id: `demo-${id++}`,
        time: recordDate.toISOString(),
        severity,
        duration,
        triggers: shuffle(TRIGGERS).slice(0, triggerCount),
        accompanying: shuffle(ACCOMPANYING).slice(0, accompanyingCount),
        intervention: interventionPool[Math.floor(Math.random() * interventionPool.length)],
        note: '',
      });
    }
  }

  // 按时间排序
  records.sort((a, b) => new Date(a.time) - new Date(b.time));
  return records;
}

/** 加权小时分布：14-16 和 2-4 为高发 */
function weightedRandomHour() {
  const weights = [
    1,1,3,3,2,1, // 0-5: 夜间高发 2-4
    1,1,1,1,1,1, // 6-11
    2,2,5,5,4,3, // 12-17: 午后高发 14-16
    2,2,1,1,1,1  // 18-23
  ];
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) return i;
  }
  return 0;
}

/** 加权严重度分布 */
function weightedSeverity() {
  const r = Math.random();
  if (r < 0.35) return 'mild';
  if (r < 0.75) return 'moderate';
  if (r < 0.95) return 'severe';
  return 'extreme';
}

// ==================== Tab 定义 ====================
const TABS = [
  { key: 'home', icon: '🏠', label: '首页', page: 'page-home' },
  { key: 'diary', icon: '📝', label: '记录', page: 'page-diary' },
  { key: 'edu', icon: '📖', label: '科普', page: 'page-edu' },
  { key: 'profile', icon: '👤', label: '我的', page: 'page-profile' },
];

// ==================== 占位页面组件 ====================
const TAB_PAGES = ['home', 'diary', 'edu', 'profile'];
const SUB_PAGES = [
  'diary-detail', 'stats', 'edu-detail', 'auricular', 'auricular-detail',
  'constitution', 'constitution-result', 'scale', 'scale-result',
  'vms-survey', 'treatment', 'about'
];
const ALL_PAGES = [...TAB_PAGES, ...SUB_PAGES];

const pageComponents = {};
ALL_PAGES.forEach(name => {
  const isTab = TAB_PAGES.includes(name);
  const titleMap = {
    'home': '沁凉助手',
    'diary': '症状记录',
    'edu': '健康科普',
    'profile': '个人中心',
    'diary-detail': '记录详情',
    'stats': '数据统计',
    'edu-detail': '文章详情',
    'auricular': '耳穴压豆',
    'auricular-detail': '穴位详情',
    'constitution': '中医体质评估',
    'constitution-result': '评估结果',
    'scale': '量表评估',
    'scale-result': '量表结果',
    'vms-survey': 'VMS 研究问卷',
    'treatment': '分级治疗推荐',
    'about': '关于',
  };

  pageComponents[`page-${name}`] = {
    template: `
      <div>
        <!-- 渐变头部 -->
        <div class="header-gradient">
          ${!isTab ? '<div class="back-btn" @click="$root.goBack()">←</div>' : ''}
          <div class="text-center ${isTab ? 'pt-2' : 'pl-10'}">
            <h1 class="text-xl font-bold">${titleMap[name] || name}</h1>
          </div>
        </div>
        <!-- 占位内容 -->
        <div class="p-4">
          <div class="card text-center py-12">
            <div class="text-4xl mb-3">${isTab ? '🚧' : '📄'}</div>
            <p class="text-gray-500 text-sm">「${titleMap[name] || name}」页面开发中</p>
            <p class="text-gray-400 text-xs mt-2">即将呈现完整功能</p>
          </div>
        </div>
      </div>
    `,
  };
});

// ==================== 每日趣闻常量 ====================
const DAILY_FUN_FACTS = [
  '🧠 潮热的核心机制是下丘脑"恒温器"被重置，温度调定点下移仅 0.4°C 就能触发散热反应。',
  '💧 一次重度潮热可在 5 分钟内流失约 200ml 汗液，相当于慢跑 15 分钟的出汗量。',
  '🌙 约 65% 的潮热发生在夜间，这就是为什么许多患者将"盗汗"列为最困扰的症状。',
  '👂 耳穴压豆治疗潮热的有效率可达 70%，刺激内分泌穴和神门穴是关键。',
  '🧊 薄荷精油涂抹太阳穴可在 30 秒内产生清凉感，是缓解突发潮热的小妙招。',
  '📉 研究表明，坚持腹式呼吸练习 4 周后，潮热频率平均降低 40%。',
  '🍵 红三叶草（Red Clover）提取物在多项临床试验中显示出减少潮热频率的潜力。',
];

// ==================== 首页增强（展示概览数据）====================
pageComponents['page-home'] = {
  template: `
    <div>
      <div class="header-gradient" style="padding-bottom: 32px;">
        <div class="text-center pt-2">
          <h1 class="text-xl font-bold">沁凉助手</h1>
          <p class="text-blue-100 text-xs mt-1">潮热盗汗 AI 智能管理</p>
        </div>
      </div>
      <div class="px-4 -mt-6 relative z-10 space-y-3">
        <!-- 今日概览：发作次数+趋势 -->
        <div class="card">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-bold text-gray-800">今日概览</h2>
            <span class="text-xs text-gray-400">{{ todayDate }}</span>
          </div>
          <div class="flex items-center gap-3 mb-3">
            <div class="flex-1 bg-blue-50 rounded-xl py-4 text-center">
              <div class="text-3xl font-bold text-blue-600">{{ todayCount }}</div>
              <div class="text-xs text-gray-500 mt-1">今日发作</div>
            </div>
            <div class="text-center px-3">
              <div class="text-sm font-bold" :class="trendDiff === 0 ? 'text-gray-400' : (trendDiff > 0 ? 'text-red-500' : 'text-green-500')">
                {{ trendDiff === 0 ? '持平' : (trendDiff > 0 ? '↑' : '↓') + ' ' + Math.abs(trendDiff) + '次' }}
              </div>
              <div class="text-xs text-gray-400 mt-0.5">较昨日</div>
            </div>
            <div class="flex-1 bg-amber-50 rounded-xl py-4 text-center">
              <div class="text-lg font-bold text-amber-500">{{ avgSeverityLabel }}</div>
              <div class="text-xs text-gray-500 mt-1">平均严重度</div>
            </div>
          </div>
          <!-- 严重度分布标签 -->
          <div class="flex gap-1.5 flex-wrap">
            <span class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-full font-medium" style="background:#ebf8ff;color:#2b6cb0;">🔵轻度 {{ severityCounts.mild }}次</span>
            <span class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-full font-medium" style="background:#fffaf0;color:#c05621;">🟡中度 {{ severityCounts.moderate }}次</span>
            <span class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-full font-medium" style="background:#fff5f5;color:#c53030;">🔴重度 {{ severityCounts.severe }}次</span>
            <span class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-full font-medium" style="background:#1a202c;color:#e2e8f0;">⚫极重度 {{ severityCounts.extreme }}次</span>
          </div>
        </div>

            <div class="flex items-end gap-0.5" style="height: 36px;">

                   :title="h.hour + ':00 - ' + h.risk + ' (' + h.probability + '%)'">
              </div>
            </div>
            <div class="flex justify-between text-xs text-gray-400 mt-1">
              <span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>23:00</span>
            </div>
            <div class="flex gap-3 mt-1 justify-center">
              <span class="flex items-center gap-1 text-xs text-gray-500"><span class="inline-block w-2 h-2 rounded-full" style="background:#fc8181;"></span>高风险</span>
              <span class="flex items-center gap-1 text-xs text-gray-500"><span class="inline-block w-2 h-2 rounded-full" style="background:#f6ad55;"></span>中风险</span>
              <span class="flex items-center gap-1 text-xs text-gray-500"><span class="inline-block w-2 h-2 rounded-full" style="background:#68d391;"></span>低风险</span>

          </div>
          <!-- 诱因 & 干预 -->
          <div class="flex gap-2 mb-2">

            <div v-if="bestIntervention" class="flex-1 bg-white/70 rounded-lg p-2 text-center">
              <div class="text-lg">💡</div>
              <div class="text-xs font-bold text-green-700">{{ bestIntervention.name }}</div>
              <div class="text-xs text-gray-500">最有效干预</div>
            </div>
          </div>
          <!-- 个性化建议 -->
          <div v-if="personalizedTips.length" class="bg-white/50 rounded-lg p-2 mb-1">
            <div class="text-xs text-purple-600 font-medium mb-1">🧠 个性化建议</div>
            <div v-for="(tip, i) in personalizedTips" :key="i" class="text-xs text-gray-600 leading-relaxed mb-0.5">• {{ tip }}</div>
          </div>
          <!-- 每日趣闻 -->
          <div class="bg-white/50 rounded-lg p-2 mt-1">
            <div class="text-xs text-purple-600 font-medium mb-0.5">💡 每日一知</div>
            <div class="text-xs text-gray-600 leading-relaxed">{{ dailyFunFact }}</div>
          </div>
        </div>

        <!-- 快速记录入口 -->
        <button class="btn-press w-full card flex items-center justify-center gap-2 py-4 border-2 border-dashed border-blue-200 hover:border-blue-400 transition-colors"
                @click="$root.showQuickRecord = true">
          <span class="text-xl">➕</span>
          <span class="text-blue-600 font-semibold">快速记录一次潮热</span>
        </button>
        <!-- 功能快捷入口 -->
        <div class="grid grid-cols-2 gap-3">
          <button class="btn-press card text-center py-4" @click="$root.navigate('stats')">
            <div class="text-2xl mb-1">📊</div>
            <div class="text-sm font-medium text-gray-700">数据统计</div>
          </button>
          <button class="btn-press card text-center py-4" @click="$root.navigate('auricular')">
            <div class="text-2xl mb-1">👂</div>
            <div class="text-sm font-medium text-gray-700">耳穴指导</div>
          </button>
          <button class="btn-press card text-center py-4" @click="$root.navigate('constitution')">
            <div class="text-2xl mb-1">🫀</div>
            <div class="text-sm font-medium text-gray-700">体质评估</div>
          </button>
          <button class="btn-press card text-center py-4" @click="$root.navigate('treatment')">
            <div class="text-2xl mb-1">💊</div>
            <div class="text-sm font-medium text-gray-700">治疗推荐</div>
          </button>
        </div>
        <div style="height: 16px;"></div>
      </div>
    </div>
  `,
  setup() {
    const store = Vue.inject('store');
    const chartRef = ref(null);
    let chartInstance = null;

    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);

    const todayDate = computed(() => {
      const d = new Date();
      return `${d.getMonth()+1}月${d.getDate()}日`;
    });

    const todaySymptoms = computed(() =>
      store.symptoms.filter(s => s.time.slice(0, 10) === todayStr)
    );

    const todayCount = computed(() => todaySymptoms.value.length);

    // 昨日发作次数
    const yesterdayStr = computed(() => {
      const d = new Date(); d.setDate(d.getDate() - 1);
      return d.toISOString().slice(0, 10);
    });
    const yesterdayCount = computed(() =>
      store.symptoms.filter(s => s.time.slice(0, 10) === yesterdayStr.value).length
    );
    const trendDiff = computed(() => todayCount.value - yesterdayCount.value);

    const avgSeverityLabel = computed(() => {
      if (!todaySymptoms.value.length) return '无';
      const scoreMap = { mild: 1, moderate: 2, severe: 3, extreme: 4 };
      const avg = todaySymptoms.value.reduce((sum, s) => sum + (scoreMap[s.severity] || 1), 0) / todaySymptoms.value.length;
      if (avg < 1.5) return '轻度';
      if (avg < 2.5) return '中度';
      if (avg < 3.5) return '重度';
      return '极重';
    });

    // 今日严重度分布计数
    const severityCounts = computed(() => {
      const counts = { mild: 0, moderate: 0, severe: 0, extreme: 0 };
      todaySymptoms.value.forEach(s => { if (counts[s.severity] !== undefined) counts[s.severity]++; });
      return counts;
    });

    const consecutiveDays = computed(() => {
      const dates = new Set(store.symptoms.map(s => s.time.slice(0, 10)));
      let count = 0;
      const d = new Date();
      while (true) {
        const ds = d.toISOString().slice(0, 10);
        if (dates.has(ds)) {
          count++;
          d.setDate(d.getDate() - 1);
        } else break;
      }
      return count;
    });

    // ---- 近7天数据聚合（用于图表）----
    const last7Days = computed(() => {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0, 10));
      }
      return days;
    });

    const weeklyData = computed(() => {
      const scoreMap = { mild: 1, moderate: 2, severe: 3, extreme: 4 };
      return last7Days.value.map(date => {
        const dayRecords = store.symptoms.filter(s => s.time.slice(0, 10) === date);
        const count = dayRecords.length;
        const avgSev = count > 0
          ? dayRecords.reduce((sum, s) => sum + (scoreMap[s.severity] || 1), 0) / count
          : 0;
        return { date, count, avgSev: Math.round(avgSev * 100) / 100 };
      });
    });

    // ---- AI 分析：高发时段 ----
    const topTimeWindows = computed(() => {
      const hourCounts = {};
      store.symptoms.forEach(s => {
        const h = new Date(s.time).getHours();
        hourCounts[h] = (hourCounts[h] || 0) + 1;
      });
      // 将小时按2小时窗口聚合
      const windows = {};
      Object.entries(hourCounts).forEach(([h, c]) => {
        const hour = parseInt(h);
        const start = Math.floor(hour / 4) * 4;
        const end = start + 3;
        const label = `${String(start).padStart(2,'0')}:00-${String(end).padStart(2,'0')}:59`;
        windows[label] = (windows[label] || 0) + c;
      });
      return Object.entries(windows)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 2)
        .map(([label, count]) => ({ label, count }));
    });

    // ---- AI 分析：主要诱因 ----
    const topTrigger = computed(() => {
      const triggers = {};
      store.symptoms.forEach(s => s.triggers.forEach(t => { triggers[t] = (triggers[t] || 0) + 1; }));
      const sorted = Object.entries(triggers).sort((a, b) => b[1] - a[1]);
      if (sorted.length) return { name: sorted[0][0], count: sorted[0][1] };
      return null;
    });

    // ---- AI 分析：最有效干预 ----
    const bestIntervention = computed(() => {
      const scoreMap = { mild: 1, moderate: 2, severe: 3, extreme: 4 };
      const interventionData = {};
      store.symptoms.forEach(s => {
        const name = s.intervention;
        if (name === '无') return;
        if (!interventionData[name]) interventionData[name] = { total: 0, sum: 0 };
        interventionData[name].total++;
        interventionData[name].sum += scoreMap[s.severity] || 1;
      });
      const entries = Object.entries(interventionData)
        .map(([name, d]) => ({ name, avg: d.sum / d.total, count: d.total }))
        .filter(e => e.count >= 2)
        .sort((a, b) => a.avg - b.avg);
      if (entries.length) return entries[0];
      return null;
    });

    // ---- 每日趣闻 ----
    const dailyFunFact = computed(() => {
      const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0).getTime()) / 86400000);
      return DAILY_FUN_FACTS[dayOfYear % DAILY_FUN_FACTS.length];
    });

    // ---- AI 预测引擎 ----
    const timePatterns = computed(() => analyzeTimePatterns(store.symptoms));
    const prediction24h = computed(() => predictNext24h(timePatterns.value));
    const accuracyBadge = computed(() => backtestAccuracy(store.symptoms));

    // 个性化建议：基于诱因分析和干预效果
    const personalizedTips = computed(() => {
      const tips = [];
      const triggerImpact = analyzeTriggerImpact(store.symptoms);
      // 找出严重度增加最多的诱因
      const worstTrigger = Object.entries(triggerImpact)
        .filter(([, v]) => v.count >= 3)
        .sort((a, b) => b[1].baselineDiff - a[1].baselineDiff)[0];
      if (worstTrigger && worstTrigger[1].baselineDiff > 0.3) {
        tips.push(`「${worstTrigger[0]}」会使发作严重度明显升高（+${worstTrigger[1].baselineDiff.toFixed(1)}），建议尽量避免`);
      }
      // 干预建议
      if (bestIntervention.value) {
        const bi = bestIntervention.value;
        if (bi.avg < 2) {
          tips.push(`「${bi.name}」效果良好（平均严重度${bi.avg.toFixed(1)}），建议在高风险时段提前使用`);
        }
      }
      // 高发时段提醒
      if (topTimeWindows.value.length) {
        const hw = topTimeWindows.value[0];
        tips.push(`高发时段为 ${hw.label}，该时段共${hw.count}次发作，建议提前做好准备`);
      }
      // 如果数据不足
      if (!tips.length && store.symptoms.length < 10) {
        tips.push('记录数据还不够多，持续记录7天以上将获得更精准的AI分析');
      }
      return tips;
    });

    // ---- ECharts 初始化 ----
    const initChart = () => {
      if (!chartRef.value || typeof echarts === 'undefined') return;
      if (chartInstance) chartInstance.dispose();
      chartInstance = echarts.init(chartRef.value);
      const data = weeklyData.value;
      const option = {
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'cross' },
          backgroundColor: 'rgba(255,255,255,0.95)',
          borderColor: '#e2e8f0',
          textStyle: { color: '#2d3748', fontSize: 12 },
        },
        grid: { left: 40, right: 40, top: 24, bottom: 28 },
        xAxis: {
          type: 'category',
          data: data.map(d => d.date.slice(5)),
          axisLine: { lineStyle: { color: '#e2e8f0' } },
          axisLabel: { color: '#718096', fontSize: 10 },
        },
        yAxis: [
          {
            type: 'value',
            name: '次数',
            nameTextStyle: { fontSize: 10, color: '#718096' },
            axisLine: { show: false },
            splitLine: { lineStyle: { color: '#f0f4f8' } },
            axisLabel: { color: '#718096', fontSize: 10 },
          },
          {
            type: 'value',
            name: '严重度',
            min: 0,
            max: 4,
            nameTextStyle: { fontSize: 10, color: '#718096' },
            axisLine: { show: false },
            splitLine: { show: false },
            axisLabel: { color: '#718096', fontSize: 10, formatter: (v) => { const m = {1:'轻',2:'中',3:'重',4:'极'}; return m[v] || ''; } },
          },
        ],
        series: [
          {
            name: '发作次数',
            type: 'bar',
            yAxisIndex: 0,
            data: data.map(d => d.count),
            itemStyle: {
              borderRadius: [4, 4, 0, 0],
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: '#4299e1' },
                { offset: 1, color: '#bee3f8' },
              ]),
            },
            barWidth: '40%',
          },
          {
            name: '平均严重度',
            type: 'line',
            yAxisIndex: 1,
            data: data.map(d => d.avgSev),
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { color: '#ed8936', width: 2 },
            itemStyle: { color: '#ed8936', borderColor: '#fff', borderWidth: 2 },
            areaStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: 'rgba(237,137,54,0.15)' },
                { offset: 1, color: 'rgba(237,137,54,0)' },
              ]),
            },
          },
        ],
      };
      chartInstance.setOption(option);
    };

    onMounted(() => {
      nextTick(() => initChart());
    });

    watch(() => store.symptoms.length, () => {
      nextTick(() => initChart());
    });

    onUnmounted(() => {
      if (chartInstance) chartInstance.dispose();
    });

    return {
      todayDate, todayCount, trendDiff, avgSeverityLabel,
      severityCounts, consecutiveDays, weeklyData,
      chartRef, topTimeWindows, topTrigger, bestIntervention,
      dailyFunFact, prediction24h, accuracyBadge, personalizedTips,
    };
  },
};

pageComponents['page-diary'] = {
  template: `
    <div>
      <div class="header-gradient" style="padding-bottom: 28px;">
        <div class="text-center pt-2">
          <h1 class="text-xl font-bold">症状记录</h1>
          <p class="text-blue-100 text-xs mt-1">共 {{ store.symptoms.length }} 条记录</p>
        </div>
      </div>
      <div class="px-4 -mt-4 relative z-10 pb-20">
        <!-- 按日期分组 -->
        <div v-for="group in groupedRecords" :key="group.date" class="mb-3">
          <div class="text-xs text-gray-400 font-medium px-1 mb-2 flex items-center justify-between">
            <span>{{ group.label }}</span>
            <span class="text-gray-300">{{ group.records.length }} 条</span>
          </div>
          <div v-for="r in group.records" :key="r.id" class="card mb-2 py-3 cursor-pointer" @click="$root.navigate('diary-detail', { id: r.id })">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <span class="inline-block w-2.5 h-2.5 rounded-full" :style="{ background: severityColor(r.severity) }"></span>
                <span class="text-sm text-gray-700 font-medium">{{ formatTime(r.time) }}</span>
                <span class="text-xs text-gray-400">{{ r.duration }}分钟</span>
              </div>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                    :style="{ background: severityBg(r.severity), color: severityColor(r.severity) }">
                {{ severityLabel(r.severity) }}
              </span>
            </div>
            <div class="flex flex-wrap gap-1 mt-2" v-if="r.triggers.length || r.accompanying.length">
              <span v-for="t in r.triggers" :key="t" class="text-xs bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full">{{ t }}</span>
              <span v-for="a in r.accompanying" :key="a" class="text-xs bg-blue-50 text-blue-500 px-2 py-0.5 rounded-full">{{ a }}</span>
            </div>
          </div>
        </div>
        <!-- 空状态 -->
        <div v-if="!store.symptoms.length" class="card text-center py-16">
          <div class="text-5xl mb-4">📝</div>
          <p class="text-gray-500 text-sm font-medium">暂无症状记录</p>
          <p class="text-gray-400 text-xs mt-2">点击右下角 + 按钮添加第一条记录</p>
        </div>
      </div>
      <!-- FAB 浮动按钮 -->
      <button class="fab btn-press" @click="$root.navigate('diary-detail', {})" title="新建记录">+</button>
    </div>
  `,
  setup() {
    const store = Vue.inject('store');
    const severityColor = (s) => SEVERITY_MAP[s]?.color || '#a0aec0';
    const severityBg = (s) => SEVERITY_MAP[s]?.bg || '#f7fafc';
    const severityLabel = (s) => SEVERITY_MAP[s]?.label || s;
    const formatTime = (iso) => {
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };

    const groupedRecords = computed(() => {
      const groups = {};
      // 按时间倒序排列
      [...store.symptoms].sort((a, b) => new Date(b.time) - new Date(a.time)).forEach(r => {
        const date = r.time.slice(0, 10);
        if (!groups[date]) groups[date] = { date, records: [] };
        groups[date].records.push(r);
      });
      return Object.values(groups).map(g => {
        const d = new Date(g.date + 'T00:00:00');
        const today = new Date();
        today.setHours(0,0,0,0);
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const gDate = new Date(g.date + 'T00:00:00');
        let label = `${d.getMonth()+1}月${d.getDate()}日 周${'日一二三四五六'[d.getDay()]}`;
        if (gDate.getTime() === today.getTime()) label = '今天';
        else if (gDate.getTime() === yesterday.getTime()) label = '昨天';
        return { ...g, label };
      });
    });

    return { store, groupedRecords, severityColor, severityBg, severityLabel, formatTime };
  },
};

const EDU_ARTICLES = [
  // 潮热机制 (2)
  {
    id: '1', title: '潮热的生理机制', icon: '🔬', category: '潮热机制',
    summary: '了解潮热发生的科学原理，从下丘脑体温调节中枢说起...',
    date: '2024-01-15',
    content: `## 潮热的生理机制

潮热（Hot Flash）是血管舒缩症状（VMS）中最典型的表现，其核心机制涉及下丘脑体温调节中枢的功能异常。

### 下丘脑的"恒温器"重置

人体的体温调节中枢位于下丘脑前区的视前区（POA）。正常情况下，该区域将核心体温维持在一个狭窄的"调定点"范围内（约36.8-37.2°C）。当核心体温偏离调定点时，中枢会启动相应的散热或产热机制来恢复平衡。

在雌激素（或雄激素经芳香化转化后）水平急剧下降的情况下，下丘脑的体温调定点会发生异常重置——向下偏移约0.4°C。这意味着，即使核心体温完全正常，下丘脑也会"误判"为体温过高，从而触发强烈的散热反应。

### 神经递质失衡

这一过程的关键神经递质包括：

- **去甲肾上腺素（NE）**：在潮热发作前，NE水平显著升高，直接激活散热通路
- **5-羟色胺（5-HT/血清素）**：参与体温调节，其代谢异常与VMS密切相关
- **γ-氨基丁酸（GABA）**：抑制性神经递质，其功能下降会导致体温调节不稳定
- **Kisspeptin神经元**：近年研究发现KNDy神经元（共同表达Kisspeptin、Neurokinin B和Dynorphin）在潮热发生中扮演关键角色

### 散热反应的级联效应

当下丘脑发出"过热"信号后，会依次引发：

1. 外周血管扩张（尤其是面部和上半身皮肤血管）
2. 大量出汗（汗腺分泌增加）
3. 心率加快
4. 皮肤温度急剧升高

这一系列反应通常持续2-5分钟，发作频率从每日数次到数十次不等，严重影响患者的生活质量。`

    content: `## 为什么ADT会引发潮热

雄激素剥夺治疗（Androgen Deprivation Therapy, ADT）是晚期前列腺癌的重要治疗手段，但约80%的患者会出现潮热等血管舒缩症状。

### 激素断崖式下降

ADT通过GnRH激动剂/拮抗剂或手术去势，将睾酮水平降至"去势水平"（<50 ng/dL）。这种人为造成的低雄激素状态，与女性绝经期雌激素下降在本质上相似——都是性激素水平的急剧降低。

关键在于，男性体内的睾酮有一部分会在脂肪组织和脑组织中经芳香化酶（aromatase）转化为雌二醇。当ADT将睾酮降至极低水平后，芳香化底物不足，导致中枢雌激素水平也显著下降。

### 体温调节中枢受损

低雄激素/雌激素状态对下丘脑的影响包括：

1. **KNDy神经元过度激活**：Kisspeptin/Neurokinin B通路在性激素缺乏时异常活跃
2. **GABAergic抑制减弱**：抑制性信号减少导致散热通路过度兴奋
3. **去甲肾上腺素能活性增强**：NE水平升高直接触发潮热

### ADT相关潮热的特点

与女性绝经期潮热相比，ADT相关潮热有以下特征：

- 发作更频繁、更剧烈
- 严重影响睡眠质量
- 常伴有情绪波动和认知功能下降
- 患者往往因"面子问题"延迟就医
- 治疗选择相对有限（HRT在前列腺癌患者中存在争议）`

    content: `## 饮食与潮热

饮食是影响潮热频率和严重度的重要可控因素。了解哪些食物可能诱发潮热，哪些食物有助于缓解症状，对日常管理至关重要。

### 可能诱发潮热的食物

**辛辣食物**：辣椒素会激活TRPV1受体，导致血管扩张和体温升高，直接触发或加重潮热发作。建议减少食用辣椒、花椒等刺激性调料。

**咖啡因**：咖啡、浓茶中的咖啡因会刺激中枢神经系统，增加去甲肾上腺素释放，从而提高潮热发生频率。建议每日咖啡因摄入量控制在200mg以内（约2杯咖啡）。

**酒精**：即使少量饮酒也会扩张血管、升高体温，是已知的强效潮热诱发因素。建议尽量避免或严格限制酒精摄入。

**热汤/热饮**：进食温度过高的食物会直接升高核心体温，触发散热反应。建议食物温度控制在温热（40-50°C）为宜。

**大豆制品**：含丰富大豆异黄酮（植物雌激素），可部分替代体内雌激素的作用，可能减少潮热频率。

**亚麻籽**：富含木脂素，具有弱雌激素活性，部分研究显示可改善VMS症状。

**深海鱼类**：富含Omega-3脂肪酸，有助于抗炎和调节神经递质平衡。

**充足饮水**：保持每日1500-2000ml的饮水量，有助于体温调节。`

    content: `## 压力与潮热的恶性循环

压力和潮热之间存在双向恶性循环——压力会加重潮热，而频繁的潮热又会增加心理压力。理解这一循环机制，是打破恶性循环的关键。

### 压力如何加重潮热

1. **HPA轴过度激活**：长期压力导致下丘脑-垂体-肾上腺（HPA）轴过度激活，皮质醇水平升高

3. **GABA功能抑制**：焦虑状态下GABA活性下降，体温调节中枢稳定性降低

### 如何打破循环

**认知行为策略**：
- 记录潮热日记，识别并管理可控制的诱因
- 学习正念减压（MBSR）技术
- 建立规律的作息时间表

**生理调节策略**：
- 腹式呼吸练习（每日2次，每次10分钟）
- 渐进性肌肉放松训练
- 适度有氧运动（每周3-5次，每次30分钟）

**社会支持**：
- 加入患者互助群组
- 与家人坦诚沟通病情
- 必要时寻求心理咨询`

    content: `## 耳穴压豆的科学原理

耳穴压豆是中医外治法的重要组成部分，通过在耳廓特定穴位贴压王不留行籽或磁珠，刺激耳部神经末梢，达到调节全身功能的目的。

### 中医理论基础

中医认为"耳者，宗脉之所聚也"——耳廓是全身经络汇聚之处。耳廓形似倒置的胎儿，各部位对应全身各脏腑器官。通过刺激耳部穴位，可以疏通经络、调和气血、平衡阴阳。

### 现代医学解释

**神经解剖学基础**：
- 耳廓有丰富的神经支配，包括耳大神经、枕小神经、迷走神经耳支等
- 迷走神经耳支（ABVN）是关键——它是唯一到达体表的副交感神经分支
- 刺激迷走神经耳支可以调节自主神经平衡，抑制交感神经过度兴奋

**神经内分泌调节**：
- 耳穴刺激可以调节下丘脑-垂体-肾上腺轴功能
- 影响5-HT、NE等与体温调节相关的神经递质水平
- 促进内源性阿片肽释放，缓解疼痛和焦虑

**临床证据**：
- 多项RCT研究证实耳穴压豆可减少潮热频率30-50%
- 安全性好，几乎无不良反应
- 可作为ADT相关潮热的辅助治疗手段`

激素替代治疗（Hormone Replacement Therapy, HRT）是缓解潮热最有效的药物治疗手段，但在ADT背景下的前列腺癌患者中需谨慎使用。

### HRT的作用机制

HRT通过补充体内缺乏的性激素（雌激素或孕激素），恢复下丘脑体温调节中枢的正常功能，从根本上解决潮热问题。

### 适应症

- 中重度VMS症状严重影响生活质量
- 非药物治疗效果不佳
- 无HRT禁忌证
- 患者充分知情并自愿选择

### 常用方案

**雌激素**：
- 低剂量雌二醇贴剂（每日25-50μg）
- 口服雌二醇（每日0.5-1mg）
- 注意：前列腺癌患者使用雌激素需评估血栓风险

**孕激素**：
- 醋酸甲地孕酮（MA）
- 可单独使用或与雌激素联合

### 风险与获益

**获益**：
- 潮热频率减少80-90%
- 睡眠质量显著改善

**风险**：
- 血栓栓塞风险增加
- 心血管事件风险

KNDy神经元（共表达Kisspeptin、Neurokinin B和Dynorphin）是体温调节的关键调控者。在性激素缺乏状态下，KNDy神经元过度激活，释放大量Neurokinin B（NKB），通过NK3受体驱动潮热发生。

NK3R拮抗剂通过阻断NKB与NK3受体的结合，抑制KNDy神经元的过度兴奋，从而减少潮热发作。

**Fezolinetant（商品名Veozah）**：

- 口服，每日一次，45mg

- 三期临床试验结果积极

- 非激素类药物，适合激素禁忌患者
- 起效快（1-2周即可观察到效果）
- 安全性良好，主要不良反应为头痛和疲劳

4-7-8呼吸法是Andrew Weil博士推荐的一种简单而有效的呼吸练习，可以帮助快速缓解潮热症状和伴随的焦虑。

### 练习方法

1. **准备**：舌尖抵住上颚前部（门牙后方的牙龈处）
2. **呼气**：用嘴完全呼气，发出"呼"的声音
3. **吸气**：闭嘴，用鼻子安静地吸气4秒
4. **屏气**：屏住呼吸7秒
5. **呼气**：用嘴呼气8秒，发出"呼"的声音
6. 重复上述循环4次

### 作用机制

- **激活副交感神经**：延长的呼气过程激活迷走神经，促进"休息与消化"反应
- **降低NE水平**：腹式呼吸可减少交感神经兴奋性
- **增加GABA释放**：深呼吸有助于提高抑制性神经递质水平
- **降低核心体温**：缓慢的呼吸有助于散热

### 使用场景

- 潮热发作时：立即进行4-8次循环
- 睡前：进行5-10分钟帮助入睡
- 焦虑发作时：连续练习直到症状缓解
- 日常保健：每日2-3次，每次5分钟

    const isEdit = computed(() => {
      return root.pageParams && root.pageParams.id;
    });

    const triggers = TRIGGERS;
    const accompanying = ACCOMPANYING;
    const interventions = INTERVENTIONS;
    const severityOpts = [

    ];

    // 初始化表单数据
    const now = new Date();
    const defaultForm = {
      time: now.toISOString().slice(0, 16),
      severity: 'moderate',
      duration: 5,
      triggers: [],
      accompanying: [],
      intervention: '无',
      note: '',
    };

    let editRecord = null;
    if (isEdit.value) {
      editRecord = store.symptoms.find(s => s.id === root.pageParams.id);
      if (editRecord) {
        const d = new Date(editRecord.time);
        // 转换为本地 datetime-local 格式
        const localTime = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        Object.assign(defaultForm, {
          time: localTime,
          severity: editRecord.severity,
          duration: editRecord.duration,
          triggers: [...editRecord.triggers],
          accompanying: [...editRecord.accompanying],
          intervention: editRecord.intervention,
          note: editRecord.note || '',
        });
      }
    }

    const form = reactive(defaultForm);

    const toggleArray = (arr, val) => {
      const idx = arr.indexOf(val);
      if (idx >= 0) arr.splice(idx, 1);
      else arr.push(val);
    };

    const save = () => {
      const timeISO = new Date(form.time).toISOString();
      if (isEdit.value && editRecord) {
        // 更新已有记录
        Object.assign(editRecord, {
          time: timeISO,
          severity: form.severity,
          duration: form.duration,
          triggers: [...form.triggers],
          accompanying: [...form.accompanying],
          intervention: form.intervention,
          note: form.note,
        });
      } else {
        // 新建记录
        store.symptoms.push({
          id: `dr-${Date.now()}`,
          time: timeISO,
          severity: form.severity,
          duration: form.duration,
          triggers: [...form.triggers],
          accompanying: [...form.accompanying],
          intervention: form.intervention,
          note: form.note,
        });
      }
      root.goBack();
    };

    const remove = () => {
      if (confirm('确定要删除这条记录吗？')) {
        const idx = store.symptoms.findIndex(s => s.id === root.pageParams.id);
        if (idx >= 0) store.symptoms.splice(idx, 1);
        root.goBack();
      }
    };

    return { isEdit, form, triggers, accompanying, interventions, severityOpts, toggleArray, save, remove };
  },
};

pageComponents['page-stats'] = {
  template: `
    <div>
      <div class="header-gradient" style="padding-bottom: 28px;">
        <div class="back-btn" @click="$root.goBack()">←</div>
        <div class="text-center pl-10">

        <!-- 时间范围选择器 -->
        <div class="card py-3">
          <div class="flex gap-2">
            <button v-for="tab in timeTabs" :key="tab.key"
                    class="btn-press flex-1 py-2 rounded-lg text-sm font-semibold transition-all"
                    :class="activeTimeTab === tab.key ? 'bg-blue-600 text-white shadow' : 'bg-gray-100 text-gray-500'"
                    @click="setTimeTab(tab.key)">
              {{ tab.label }}
            </button>
          </div>
        </div>

        <!-- 发作频率趋势图 -->
        <div class="card">
          <h2 class="font-bold text-gray-800 text-sm mb-2">📈 发作频率趋势</h2>
          <div ref="trendChartRef" class="chart-container"></div>
        </div>

        <!-- 严重度分布饼图 -->
        <div class="card">
          <h2 class="font-bold text-gray-800 text-sm mb-2">🍩 严重度分布</h2>
          <div ref="pieChartRef" class="chart-container"></div>
        </div>

        <!-- 诱因频率柱状图 -->
        <div class="card">
          <h2 class="font-bold text-gray-800 text-sm mb-2">⚠️ 诱因频率排名</h2>
          <div ref="triggerChartRef" class="chart-container"></div>
        </div>

        <!-- 24h×7day 热力图 -->
        <div class="card">
          <h2 class="font-bold text-gray-800 text-sm mb-2">🗓️ 发作热力图 (24h × 周)</h2>
          <div ref="heatmapRef" class="chart-container-lg"></div>
        </div>

        <!-- 干预效果对比 -->
        <div class="card">
          <h2 class="font-bold text-gray-800 text-sm mb-2">💊 干预效果对比</h2>
          <div ref="interventionChartRef" class="chart-container"></div>
        </div>

      </div>
    </div>
  `,
  setup() {
    const store = Vue.inject('store');

    const activeTimeTab = ref('week');
    const timeTabs = [
      { key: 'day', label: '日' },
      { key: 'week', label: '周' },
      { key: 'month', label: '月' },
    ];

    const trendChartRef = ref(null);
    const pieChartRef = ref(null);
    const triggerChartRef = ref(null);
    const heatmapRef = ref(null);
    const interventionChartRef = ref(null);
    let charts = [];

    const scoreMap = { mild: 1, moderate: 2, severe: 3, extreme: 4 };

    // ---- 按时间范围过滤 ----
    const filteredSymptoms = computed(() => {
      const now = new Date();
      const range = activeTimeTab.value;
      let startDate;
      if (range === 'day') {
        startDate = new Date(now); startDate.setHours(0,0,0,0);
      } else if (range === 'week') {
        startDate = new Date(now); startDate.setDate(startDate.getDate() - 6); startDate.setHours(0,0,0,0);
      } else {
        startDate = new Date(now); startDate.setDate(startDate.getDate() - 29); startDate.setHours(0,0,0,0);
      }
      return store.symptoms.filter(s => new Date(s.time) >= startDate);
    });

    // ---- 趋势数据 ----
    const trendData = computed(() => {
      const range = activeTimeTab.value;
      const now = new Date();
      const data = [];
      if (range === 'day') {
        // 按小时统计
        for (let h = 0; h < 24; h++) {
          const count = filteredSymptoms.value.filter(s => {
            const d = new Date(s.time);
            return d.getHours() === h && d.toDateString() === now.toDateString();
          }).length;
          data.push({ label: `${String(h).padStart(2,'0')}:00`, count });
        }
      } else {
        // 按天统计
        const days = range === 'week' ? 7 : 30;
        for (let i = days - 1; i >= 0; i--) {
          const d = new Date(now); d.setDate(d.getDate() - i);
          const ds = d.toISOString().slice(0, 10);
          const count = store.symptoms.filter(s => s.time.slice(0, 10) === ds).length;
          data.push({ label: ds.slice(5), count });
        }
      }
      return data;
    });

    // ---- 严重度分布数据 ----
    const pieData = computed(() => {
      const counts = { mild: 0, moderate: 0, severe: 0, extreme: 0 };
      filteredSymptoms.value.forEach(s => { if (counts[s.severity] !== undefined) counts[s.severity]++; });
      return [
        { value: counts.mild, name: '轻度', itemStyle: { color: '#68d391' } },
        { value: counts.moderate, name: '中度', itemStyle: { color: '#f6ad55' } },
        { value: counts.severe, name: '重度', itemStyle: { color: '#fc8181' } },
        { value: counts.extreme, name: '极重度', itemStyle: { color: '#e53e3e' } },
      ].filter(d => d.value > 0);
    });

    // ---- 诱因频率数据 ----
    const triggerData = computed(() => {
      const counts = {};
      filteredSymptoms.value.forEach(s => {
        s.triggers.forEach(t => { counts[t] = (counts[t] || 0) + 1; });
      });
      return Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([name, count]) => ({ name, count }));
    });

    // ---- 热力图数据 (24h × 7day) ----
    const heatmapData = computed(() => {
      const data = [];
      const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const counts = {};
      store.symptoms.forEach(s => {
        const d = new Date(s.time);
        const hour = d.getHours();
        const weekday = d.getDay();
        const key = `${hour}-${weekday}`;
        counts[key] = (counts[key] || 0) + 1;
      });
      let maxVal = 0;
      for (let h = 0; h < 24; h++) {
        for (let w = 0; w < 7; w++) {
          const val = counts[`${h}-${w}`] || 0;
          if (val > maxVal) maxVal = val;
          data.push([h, w, val]);
        }
      }
      return { data, maxVal, dayNames };
    });

    // ---- 干预对比数据 ----
    const interventionData = computed(() => {
      const withInt = {}; // intervention_name -> { sum, count }
      const withoutInt = { sum: 0, count: 0 };
      filteredSymptoms.value.forEach(s => {
        const score = scoreMap[s.severity] || 1;
        if (s.intervention === '无' || !s.intervention) {
          withoutInt.sum += score;
          withoutInt.count++;
        } else {
          if (!withInt[s.intervention]) withInt[s.intervention] = { sum: 0, count: 0 };
          withInt[s.intervention].sum += score;
          withInt[s.intervention].count++;
        }
      });
      const names = Object.keys(withInt).sort((a, b) => withInt[a].count - withInt[b].count);
      const withAvg = names.map(n => Math.round(withInt[n].sum / withInt[n].count * 100) / 100);
      const withoutAvg = withoutInt.count > 0
        ? Math.round(withoutInt.sum / withoutInt.count * 100) / 100
        : 0;
      return { names, withAvg, withoutAvg, withoutCount: withoutInt.count };
    });

    // ---- 图表渲染 ----
    const renderTrendChart = () => {
      if (!trendChartRef.value) return;
      const data = trendData.value;
      const option = {
        tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.95)', borderColor: '#e2e8f0', textStyle: { color: '#2d3748', fontSize: 12 } },
        grid: { left: 40, right: 20, top: 16, bottom: 28 },
        xAxis: { type: 'category', data: data.map(d => d.label), axisLine: { lineStyle: { color: '#e2e8f0' } }, axisLabel: { color: '#718096', fontSize: 10, rotate: data.length > 15 ? 45 : 0 } },
        yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: '#f0f4f8' } }, axisLabel: { color: '#718096', fontSize: 10 } },
        series: [{
          type: 'line', data: data.map(d => d.count), smooth: true, symbol: 'circle', symbolSize: 5,

    onMounted(() => renderAllCharts());
    watch(() => store.symptoms.length, () => renderAllCharts());
    onUnmounted(() => charts.forEach(c => c.dispose()));

    return { activeTimeTab, timeTabs, setTimeTab, trendChartRef, pieChartRef, triggerChartRef, heatmapRef, interventionChartRef };

// ==================== AI 预测引擎 ====================
/** 分析发作时间模式：统计每小时发作次数，返回概率数组(0-23) */
function analyzeTimePatterns(symptoms) {
  const hourCounts = new Array(24).fill(0);
  symptoms.forEach(s => {
    const h = new Date(s.time).getHours();
    hourCounts[h]++;
  });
  const total = symptoms.length || 1;
  return hourCounts.map(c => c / total);
}

/** 分析诱因影响：计算每个诱因的出现次数、伴随发作的平均严重度，与整体基线对比 */
function analyzeTriggerImpact(symptoms) {
  const scoreMap = { mild: 1, moderate: 2, severe: 3, extreme: 4 };
  const overallAvg = symptoms.length
    ? symptoms.reduce((s, r) => s + (scoreMap[r.severity] || 1), 0) / symptoms.length
    : 0;
  const result = {};
  TRIGGERS.forEach(t => {
    const withTrigger = symptoms.filter(s => s.triggers.includes(t));
    if (withTrigger.length > 0) {
      result[t] = {
        count: withTrigger.length,
        avgSeverity: withTrigger.reduce((s, r) => s + (scoreMap[r.severity] || 1), 0) / withTrigger.length,
        baselineDiff: withTrigger.reduce((s, r) => s + (scoreMap[r.severity] || 1), 0) / withTrigger.length - overallAvg,
      };
    }
  });
  return result;
}

/** 预测未来24小时风险：基于时间模式，为每小时分类高/中/低风险 */
function predictNext24h(patterns) {
  return patterns.map((p, i) => ({
    hour: i,
    risk: p > 0.15 ? 'high' : p > 0.08 ? 'medium' : 'low',
    probability: Math.round(p * 100),
  }));
}

/** 回测准确率：用最近7天的小时模式预测每天发作数，计算平均准确率 */
function backtestAccuracy(symptoms) {
  const scoreMap = { mild: 1, moderate: 2, severe: 3, extreme: 4 };
  const now = new Date();
  const recentSymptoms = symptoms.filter(s => {
    const d = new Date(s.time);
    return (now - d) < 7 * 86400000;
  });
  if (recentSymptoms.length < 7) return null;
  const patterns = analyzeTimePatterns(recentSymptoms);
  let totalError = 0;
  let days = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dayStr = d.toISOString().slice(0, 10);
    const dayRecords = recentSymptoms.filter(s => s.time.slice(0, 10) === dayStr);
    const actual = dayRecords.length;
    let predicted = 0;
    dayRecords.forEach(r => { predicted += patterns[new Date(r.time).getHours()]; });
    const avgPattern = patterns.reduce((a, b) => a + b, 0);
    if (avgPattern > 0) predicted = Math.round(predicted / avgPattern);
    if (actual > 0) {
      totalError += Math.abs(predicted - actual) / actual * 100;
      days++;
    }
  }
  if (days === 0) return null;
  return Math.round(100 - totalError / days);
}

const app = createApp({
  setup() {
    // ---------- 全局状态 ----------
    const loadFromStorage = (key, defaultValue) => {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : defaultValue;
      } catch { return defaultValue; }
    };

    const store = reactive({
      symptoms: loadFromStorage(STORAGE_KEYS.symptoms, []),
      profile: loadFromStorage(STORAGE_KEYS.profile, {
        name: '演示用户',
        gender: 'male',
        age: 65,
        condition: '前列腺癌ADT治疗中',
      }),
      constitution: loadFromStorage(STORAGE_KEYS.constitution, null),
      scaleResults: loadFromStorage(STORAGE_KEYS.scaleResults, []),
    });

    // 首次加载时如果没有数据，生成演示数据
    if (!store.symptoms.length) {
      store.symptoms = generateDemoData();
    }

    // 自动保存到 localStorage
    watch(() => store.symptoms, (val) => {
      localStorage.setItem(STORAGE_KEYS.symptoms, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.profile, (val) => {
      localStorage.setItem(STORAGE_KEYS.profile, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.constitution, (val) => {
      localStorage.setItem(STORAGE_KEYS.constitution, JSON.stringify(val));
    }, { deep: true });
    watch(() => store.scaleResults, (val) => {
      localStorage.setItem(STORAGE_KEYS.scaleResults, JSON.stringify(val));
    }, { deep: true });

    // 提供给所有子组件
    Vue.provide('store', store);

    // ---------- 路由系统 ----------
    const tabs = TABS;
    const currentTab = ref('home');
    const currentPage = ref('home');
    const pageParams = ref({});
    const pageHistory = ref([]);

    const isSubPage = computed(() => !TAB_PAGES.includes(currentPage.value));

    // Tab 栏上显示的页面
    const tabPages = {
      home: 'page-home',
      diary: 'page-diary',
      edu: 'page-edu',
      profile: 'page-profile',
    };

    const switchTab = (tabKey) => {
      currentTab.value = tabKey;
      pageHistory.value = [];
      currentPage.value = tabKey;
      pageParams.value = {};
      window.location.hash = tabKey === 'home' ? '' : tabKey;
    };

    const navigate = (pageName, params = {}) => {
      pageHistory.value.push({ page: currentPage.value, tab: currentTab.value, params: { ...pageParams.value } });
      currentPage.value = pageName;
      pageParams.value = params;
      window.location.hash = pageName;
    };

    const goBack = () => {
      if (pageHistory.value.length) {
        const prev = pageHistory.value.pop();
        currentPage.value = prev.page;
        currentTab.value = prev.tab;
        pageParams.value = prev.params || {};
        window.location.hash = prev.page === 'home' ? '' : prev.page;
      } else {
        switchTab(currentTab.value);
      }
    };

    // Hash 初始化
    const initFromHash = () => {
      const hash = window.location.hash.slice(1);
      if (hash && ALL_PAGES.includes(hash)) {
        if (TAB_PAGES.includes(hash)) {
          currentTab.value = hash;
          currentPage.value = hash;
        } else {
          currentPage.value = hash;
        }
      }
    };
    initFromHash();
    window.addEventListener('hashchange', initFromHash);

    // ---------- 快速记录 ----------
    const showQuickRecord = ref(false);
    const quickRecord = reactive({
      severity: 'moderate',
      time: new Date().toISOString().slice(0, 16),
      duration: 5,
    });
    const severityOptions = [
      { value: 'mild', label: '轻度', emoji: '🟢', color: '#68d391', bg: '#f0fff4' },
      { value: 'moderate', label: '中度', emoji: '🟡', color: '#f6ad55', bg: '#fffaf0' },
      { value: 'severe', label: '重度', emoji: '🔴', color: '#fc8181', bg: '#fff5f5' },
      { value: 'extreme', label: '极重', emoji: '⚫', color: '#e53e3e', bg: '#fed7d7' },
    ];
    const saveQuickRecord = () => {
      const record = {
        id: `qr-${Date.now()}`,
        time: new Date(quickRecord.time).toISOString(),
        severity: quickRecord.severity,
        duration: quickRecord.duration,
        triggers: [],
        accompanying: [],
        intervention: '无',
        note: '',
      };
      store.symptoms.push(record);
      showQuickRecord.value = false;
      // 重置
      quickRecord.severity = 'moderate';
      quickRecord.time = new Date().toISOString().slice(0, 16);
      quickRecord.duration = 5;
    };

    return {
      store,
      tabs,
      currentTab,
      currentPage,
      pageParams,
      isSubPage,
      switchTab,
      navigate,
      goBack,
      showQuickRecord,
      quickRecord,
      severityOptions,
      saveQuickRecord,
    };
  },
});

// 注册所有页面组件
Object.entries(pageComponents).forEach(([name, component]) => {
  app.component(name, component);
});

app.mount('#app');
</script>
</body>
